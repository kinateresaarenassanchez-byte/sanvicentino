{% extends 'base.html' %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-3xl font-bold mb-8 text-gray-800">Crear Nuevo Producto</h2>
    
    <form method="POST" enctype="multipart/form-data" class="bg-white shadow-lg rounded-lg p-8 space-y-6">
        
        <!-- Nombre del Producto -->
        <div>
            <label for="nombre" class="block text-sm font-semibold text-gray-700 mb-2">Nombre del Producto *</label>
            <input 
                id="nombre"
                name="nombre" 
                type="text"
                placeholder="Ingresa el nombre del producto" 
                required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <!-- Precio -->
        <div>
            <label for="precio" class="block text-sm font-semibold text-gray-700 mb-2">Precio *</label>
            <input 
                id="precio"
                name="precio" 
                type="number" 
                step="0.01" 
                placeholder="0.00" 
                required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <!-- Categoría -->
        <div>
            <label for="categoria" class="block text-sm font-semibold text-gray-700 mb-2">Categoría *</label>
            <input 
                id="categoria"
                name="categoria" 
                type="text"
                placeholder="Ej: Bebidas, Alimentos, etc." 
                required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
        </div>

        <!-- Sección de Imagen -->
        <div class="border-t pt-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">Imagen del Producto</h3>
            
            <!-- Opción 1: Subir Archivo -->
            <div class="mb-6">
                <label for="imagen_archivo" class="block text-sm font-semibold text-gray-700 mb-2">Subir Archivo de Imagen</label>
                <div class="relative">
                    <input 
                        id="imagen_archivo"
                        name="imagen_archivo" 
                        type="file" 
                        accept="image/*"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
                        onchange="previewImage(event)">
                    <p class="text-xs text-gray-500 mt-1">Formatos aceptados: JPG, PNG, GIF, WebP (máx. 5MB)</p>
                </div>
                
                <!-- Vista Previa de Imagen -->
                <div id="image-preview-container" class="mt-4 hidden">
                    <p class="text-sm font-semibold text-gray-700 mb-2">Vista Previa:</p>
                    <img id="image-preview" src="" alt="Vista previa" class="max-w-xs h-auto rounded-lg shadow-md border border-gray-300">
                    <button type="button" onclick="clearImagePreview()" class="mt-2 text-sm text-red-600 hover:text-red-800 font-semibold">
                        Limpiar selección
                    </button>
                </div>
            </div>

            <!-- Divisor O -->
            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="px-4 text-gray-500 font-semibold">O</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>

            <!-- Opción 2: URL de Imagen -->
            <div>
                <label for="imagen_url" class="block text-sm font-semibold text-gray-700 mb-2">URL de Imagen (Alternativa)</label>
                <input 
                    id="imagen_url"
                    name="imagen" 
                    type="url"
                    placeholder="https://ejemplo.com/imagen.jpg" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                <p class="text-xs text-gray-500 mt-1">Si prefieres usar una URL externa en lugar de subir un archivo</p>
            </div>
        </div>

        <!-- Botones de Acción -->
        <div class="flex gap-3 pt-6">
            <button 
                type="submit" 
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-3 rounded-lg transition duration-200 shadow-md">
                Guardar Producto
            </button>
            <button 
                type="reset" 
                class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold px-6 py-3 rounded-lg transition duration-200">
                Limpiar Formulario
            </button>
        </div>
    </form>
</div>

<script>
function previewImage(event) {
    const file = event.target.files[0];
    const preview = document.getElementById('image-preview');
    const previewContainer = document.getElementById('image-preview-container');
    
    if (file) {
        // Validar tipo de archivo
        const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
        if (!validTypes.includes(file.type)) {
            alert('Por favor, selecciona un formato de imagen válido (JPG, PNG, GIF, WebP)');
            event.target.value = '';
            previewContainer.classList.add('hidden');
            return;
        }
        
        // Validar tamaño (máx 5MB)
        if (file.size > 5 * 1024 * 1024) {
            alert('La imagen no puede superar 5MB');
            event.target.value = '';
            previewContainer.classList.add('hidden');
            return;
        }
        
        // Mostrar preview
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            previewContainer.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
    }
}

function clearImagePreview() {
    document.getElementById('imagen_archivo').value = '';
    document.getElementById('image-preview-container').classList.add('hidden');
    document.getElementById('image-preview').src = '';
}
</script>
{% endblock %}
