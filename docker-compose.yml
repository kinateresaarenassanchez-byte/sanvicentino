version: '3.8'

services:
  db:
    image: postgres:13
    container_name: sanvicentino_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sanvicentino
      POSTGRES_USER: sanvicentino_user
      POSTGRES_PASSWORD: sanvicentino_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanvicentino_user -d sanvicentino"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sanvicentino_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/__pycache__
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app/run.py
      - DATABASE_URL=postgresql://sanvicentino_user:sanvicentino_pass@db:5432/sanvicentino
    depends_on:
      db:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  db_data:
